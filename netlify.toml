[build]
  publish = "dist"
  command = "pnpm build"

[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true

# Enable Netlify's prerendering for search engine bots
# This renders the SPA in a headless browser for crawlers,
# so they see fully rendered HTML instead of an empty #root div
[build.processing.prerender]
  enable = true

# Cache hashed assets indefinitely (Vite fingerprints these)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache static files (images, fonts, PDFs) for 1 week
[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.pdf"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# SPA routing — serve index.html for all routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
